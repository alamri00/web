<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Payment</title>

<style>

body{
    margin:0;
    padding:30px;
    font-family:Arial, sans-serif;
    background:linear-gradient(to right, #0f2027, #203a43, #2c5364);
}

.container{
    width:450px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    color:#1f3b4d;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:20px;
    padding:15px;
    background:#1f3b4d;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#2c5364;
}

</style>

</head>
<body>

<div class="container">

<h1>Payment</h1>

<form action="payment.php" method="POST">

<label>Booking ID</label>
<input type="text" name="BookingID" required>

<label>Card Holder Name</label>
<input type="text" name="CardName" required>

<label>Card Number</label>
<input type="text" name="CardNumber" required>

<label>Expiry Date</label>
<input type="month" name="ExpiryDate" required>

<label>CVV</label>
<input type="password" name="CVV" required>

<label>Amount ($)</label>
<input type="number" name="Amount" required>

<button type="submit">Pay Now</button>

</form>

</div>

</body>
</html>
