<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    width:420px;
    padding:35px;
    border-radius:20px;
    box-shadow:0px 0px 20px rgba(0,0,0,0.4);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#1f3b4d;
}

label{
    display:block;
    margin-bottom:5px;
    margin-top:15px;
    font-weight:bold;
    color:#1f3b4d;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#2c5364;
}

input[type="submit"]{
    background:#1f3b4d;
    color:white;
    border:none;
    cursor:pointer;
    font-size:18px;
    margin-top:20px;
    transition:0.3s;
}

input[type="submit"]:hover{
    background:#2c5364;
}

</style>

</head>
<body>

<div class="container">

    <h2>Hotel Booking Login</h2>

    <form action="login.php" method="POST">

        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <input type="submit" value="Login">

    </form>

</div>

</body>
</html>
